<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="css/game.css">
        <title>Creative Journey</title>

        <style>
            /* Reset dasar */
            body {
                background-color: black;
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
            }

            /* Memaksa canvas memenuhi layar secara landscape & proporsional */
            canvas, #gameCanvas {
                width: 100vw !important;
                height: 100vh !important;
                object-fit: contain;
                display: block;
                margin: auto;
                touch-action: none !important; /* Mencegah geser layar browser */
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: rgba(0,0,0,0);
            }

            /* Peringatan jika layar portrait (opsional) */
            @media screen and (orientation: portrait) {
                body::after {
                    content: "Mohon putar layar ke Landscape 🔄";
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: #222; color: white;
                    display: flex; align-items: center; justify-content: center;
                    z-index: 9999; font-family: sans-serif;
                }
            }
        </style>
    </head>

    <body style="background-color: black">
        <script type="text/javascript" src="js/main.js"></script>

        <script type="text/javascript">
            // 1. Mematikan Menu Klik Kanan (biar gak buka menu terus pas mencet tombol)
            document.addEventListener('contextmenu', event => event.preventDefault());

            // 2. Mematikan Zoom saat tap dua jari
            document.addEventListener('touchstart', function (event) {
                if (event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });

            // 3. Mematikan Double Tap Zoom
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function (event) {
                let now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
        </script>
    </body>
</html>
