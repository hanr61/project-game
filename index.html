<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="css/game.css">
        <title>Creative Journey</title>

        <style>
            body {
                background-color: black;
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                /* Mencegah seleksi teks dan klik kanan sistem */
                -webkit-user-select: none;
                user-select: none;
                touch-action: none;
            }

            /* Container utama game */
            #errorPrinter, #gameCanvas {
                width: 100vw !important;
                height: 100vh !important;
                object-fit: contain;
                display: block;
                margin: auto;
                touch-action: none !important;
                -webkit-tap-highlight-color: rgba(0,0,0,0);
            }

            /* Overlay rotasi layar */
            @media screen and (orientation: portrait) {
                body::after {
                    content: "Mohon putar layar ke Landscape 🔄";
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: #111; color: #fff;
                    display: flex; align-items: center; justify-content: center;
                    z-index: 9999; font-family: sans-serif; font-weight: bold;
                }
            }
        </style>
    </head>

    <body style="background-color: black;">
    <script type="text/javascript" src="js/main.js"></script>

    <script>
        // Paksa browser agar fokus ke game saat layar di-tap
        document.addEventListener('touchstart', function() {
            window.focus();
        }, false);

        // Matikan fungsi klik kanan/menu biar gak bentrok sama analog
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
