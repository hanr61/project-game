<html>

<style>

    width: 100vw !important;
    height: 100vh !important;
    object-fit: contain; /* Menjaga aspek rasio 1280x720 tetap pas */

    margin: auto;
  }
  canvas, #gameCanvas {
    touch-action: none; /* Mencegah browser mengambil alih fungsi sentuh */

}

    background-color: black;
    overflow: hidden;
  }

</style>
